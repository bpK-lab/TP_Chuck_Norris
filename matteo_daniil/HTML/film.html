<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title> Accueil </title>
    <link rel="stylesheet" href="../css/style.css"/>
</head>
<body style="background-color:rgb(255, 158, 46);">
    <h1 class="titre"> Films connus auxquels Chuck Norris a participé </h1>
    
	<div class="main-content">
        <div class="film-container">
            <div class="image-wrapper">
                <h2>La Fureur du dragon</h2>
                <img src="../IMG/dragon.jpg" alt="La Fureur du dragon" data-desc="Sorti en 1972. Le combat final contre Bruce Lee est considéré comme l'un des plus grands de l'histoire du cinéma.">
            </div>
            <div class="info-text"></div>
        </div>

        <div class="film-container">
            <div class="image-wrapper">
                <h2>Invasion USA</h2>
                <img src="../IMG/usa.jpg" alt="Invasion USA" data-desc="Sorti en 1985. Chuck Norris y incarne Matt Hunter, un agent à la retraite qui doit reprendre du service.">
            </div>
            <div class="info-text"></div>
        </div>

		<div class="film-container">
            <div class="image-wrapper">
                <h2>Delta Force</h2>
                <img src="../IMG/delta.jpg" alt="Delta Force" data-desc="Sorti en 1986. Une unité d'élite intervient lors d'un détournement d'avion à Beyrouth.">
            </div>
            <div class="info-text"></div>
        </div>

		<div class="film-container">
            <div class="image-wrapper">
                <h2>Sale temps pour un flic</h2>
                <img src="../IMG/souffrance.webp" alt="Sale temps pour un flic" data-desc="Sorti en 1985. Un flic de Chicago se retrouve seul contre la mafia et des policiers corrompus.">
            </div>
            <div class="info-text"></div>
        </div>
        
    </div>

    <div id="infobulle" style="display:none; position:absolute; background:rgba(0,0,0,0.8); color:white; padding:10px; border-radius:5px; pointer-events:none; max-width: 300px;"></div>

	<script src="../JS/filmScript.js"></script>
</body>
</html>
